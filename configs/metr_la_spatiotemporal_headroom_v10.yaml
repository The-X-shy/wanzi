experiment_name: metr_la_spatiotemporal_headroom_v10
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 30
  patience: 10
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 5
  trigger_node_count: 10
  trigger_scope_node_count: 40
  poison_ratios: [0.05, 0.075, 0.10]
  sigma_multipliers: [0.12, 0.16, 0.20]
  selection_strategies: [spatiotemporal_headroom]
  sample_selection_mode: tail_headroom
  sample_selection_modes: [tail_headroom]
  target_shift_mode: additive_directional
  target_shift_modes: [additive_directional]
  target_horizon_mode: tail
  target_horizon_modes: [tail]
  target_horizon_count: 6
  target_shift_ratio: 0.15
  target_shift_ratios: [0.15]
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.05
  max_clean_mae_delta_ratio: 0.08
  evaluation_tail_horizon_count: 3
  target_region_loss_weight: 200.0
  target_region_loss_weights: [200.0]
  window_mode: hybrid
  window_modes: [hybrid]
  frequency_smoothing_strength: 0.25
  frequency_smoothing_strengths: [0.25]
  frequency_cutoff_ratio: 0.35
  frequency_cutoff_ratios: [0.35]
  frequency_decay: 0.25
  frequency_decays: [0.25]

defense:
  zscore_threshold: 3.0
  moving_average_window: 3
  frequency_band_fraction: 0.25

output:
  root_dir: ../results
