experiment_name: metr_la_opt_tail_directional
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 30
  patience: 10
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 5
  trigger_node_count: 3
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.03
  evaluation_tail_horizon_count: 3
  node_rank_weights: [1.0, 0.85, 0.7]
  tail_horizon_weights: [0.7, 0.85, 1.0]
  recheck_top_k: 5
  recheck_repeats: 3
  candidate_defaults: &tail_directional_base
    selection_strategy: error
    window_mode: tail
    trigger_steps: 5
    trigger_node_count: 3
    sample_selection_mode: directional_headroom
    target_weight_mode: dual_focus
    target_horizon_mode: all
    target_horizon_count: 3
    time_smoothing_kernel: 3
    frequency_smoothing_strength: 0.35
    frequency_cutoff_ratio: 0.35
    frequency_decay: 0.35
    spectral_constraint_strength: 0.0
    headroom_error_mix: 0.6
    loss_focus_mode: directional_focus
  search_stages:
    - name: tail_directional_main
      explicit_candidates:
        - selection_strategy: error
          window_mode: tail
          trigger_steps: 5
          trigger_node_count: 3
          sample_selection_mode: input_energy
          target_weight_mode: flat
          target_horizon_mode: all
          target_horizon_count: 3
          time_smoothing_kernel: 3
          frequency_smoothing_strength: 0.0
          frequency_cutoff_ratio: 0.5
          frequency_decay: 0.35
          spectral_constraint_strength: 0.0
          poison_ratio: 0.020
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.30
          tail_focus_multiplier: 1.60
          loss_focus_mode: uniform
          loss_selected_node_weight: 1.15
          loss_tail_horizon_weight: 1.75
          loss_headroom_boost: 0.40
        - <<: *tail_directional_base
          poison_ratio: 0.018
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.30
          tail_focus_multiplier: 1.60
          loss_selected_node_weight: 1.20
          loss_tail_horizon_weight: 2.00
          loss_headroom_boost: 0.70
        - <<: *tail_directional_base
          poison_ratio: 0.020
          sigma_multiplier: 0.055
          target_shift_ratio: 0.080
          global_shift_fraction: 0.35
          tail_focus_multiplier: 1.60
          loss_selected_node_weight: 1.25
          loss_tail_horizon_weight: 2.20
          loss_headroom_boost: 0.80
        - <<: *tail_directional_base
          poison_ratio: 0.020
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.35
          tail_focus_multiplier: 1.70
          loss_selected_node_weight: 1.30
          loss_tail_horizon_weight: 2.30
          loss_headroom_boost: 0.90
        - <<: *tail_directional_base
          poison_ratio: 0.0225
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.40
          tail_focus_multiplier: 1.80
          loss_selected_node_weight: 1.35
          loss_tail_horizon_weight: 2.50
          loss_headroom_boost: 1.00
        - <<: *tail_directional_base
          poison_ratio: 0.025
          sigma_multiplier: 0.055
          target_shift_ratio: 0.085
          global_shift_fraction: 0.45
          tail_focus_multiplier: 1.90
          loss_selected_node_weight: 1.40
          loss_tail_horizon_weight: 2.60
          loss_headroom_boost: 1.10
        - <<: *tail_directional_base
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.70
          poison_ratio: 0.020
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.35
          tail_focus_multiplier: 1.70
          loss_selected_node_weight: 1.30
          loss_tail_horizon_weight: 2.30
          loss_headroom_boost: 0.90
        - <<: *tail_directional_base
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.75
          poison_ratio: 0.0225
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.40
          tail_focus_multiplier: 1.80
          loss_selected_node_weight: 1.35
          loss_tail_horizon_weight: 2.50
          loss_headroom_boost: 1.00
        - <<: *tail_directional_base
          frequency_smoothing_strength: 0.0
          poison_ratio: 0.020
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.35
          tail_focus_multiplier: 1.70
          loss_selected_node_weight: 1.30
          loss_tail_horizon_weight: 2.30
          loss_headroom_boost: 0.90
        - <<: *tail_directional_base
          spectral_constraint_strength: 0.20
          poison_ratio: 0.0225
          sigma_multiplier: 0.060
          target_shift_ratio: 0.080
          global_shift_fraction: 0.40
          tail_focus_multiplier: 1.80
          loss_selected_node_weight: 1.35
          loss_tail_horizon_weight: 2.50
          loss_headroom_boost: 1.00

defense:
  zscore_threshold: 3.0
  moving_average_window: 3
  frequency_band_fraction: 0.25

output:
  root_dir: ../results
