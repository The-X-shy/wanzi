experiment_name: metr_la_opt_loss_rebalance
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 30
  patience: 10
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 3
  trigger_node_count: 3
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.03
  evaluation_tail_horizon_count: 3
  node_rank_weights: [1.0, 0.85, 0.7]
  tail_horizon_weights: [0.7, 0.85, 1.0]
  recheck_top_k: 3
  recheck_repeats: 3
  search_stages:
    - name: loss_rebalance_main
      explicit_candidates:
        - &loss_base
          selection_strategy: error
          window_mode: hybrid
          trigger_steps: 3
          trigger_node_count: 3
          poison_ratio: 0.02
          sigma_multiplier: 0.065
          sample_selection_mode: directional_headroom
          target_weight_mode: dual_focus
          target_horizon_mode: all
          target_horizon_count: 3
          time_smoothing_kernel: 3
          frequency_smoothing_strength: 0.05
          frequency_cutoff_ratio: 0.5
          frequency_decay: 0.35
          headroom_error_mix: 0.6
          global_shift_fraction: 0.3
          tail_focus_multiplier: 1.6
          loss_focus_mode: directional_focus
        - <<: *loss_base
          target_shift_ratio: 0.075
          loss_selected_node_weight: 1.2
          loss_tail_horizon_weight: 1.9
          loss_headroom_boost: 0.6
        - <<: *loss_base
          target_shift_ratio: 0.075
          loss_selected_node_weight: 1.2
          loss_tail_horizon_weight: 2.1
          loss_headroom_boost: 0.6
        - <<: *loss_base
          target_shift_ratio: 0.075
          loss_selected_node_weight: 1.25
          loss_tail_horizon_weight: 2.1
          loss_headroom_boost: 0.6
        - <<: *loss_base
          target_shift_ratio: 0.08
          loss_selected_node_weight: 1.25
          loss_tail_horizon_weight: 2.1
          loss_headroom_boost: 0.8
        - <<: *loss_base
          target_shift_ratio: 0.08
          loss_selected_node_weight: 1.3
          loss_tail_horizon_weight: 2.1
          loss_headroom_boost: 0.8
        - <<: *loss_base
          target_shift_ratio: 0.08
          loss_selected_node_weight: 1.3
          loss_tail_horizon_weight: 2.2
          loss_headroom_boost: 0.8

output:
  root_dir: ../results
