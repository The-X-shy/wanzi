experiment_name: metr_la_paper_local_error_smoke
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 4
  patience: 2
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 3
  trigger_node_count: 3
  poison_ratios: [0.018]
  sigma_multipliers: [0.065]
  selection_strategies: [error]
  window_modes: [hybrid]
  sample_selection_mode: input_energy
  sample_selection_modes: [input_energy, local_error_ratio]
  target_weight_mode: flat
  target_weight_modes: [flat, ranked_decay]
  node_rank_weights: [1.0, 0.85, 0.7]
  tail_horizon_weights: [0.7, 0.85, 1.0]
  target_shift_ratio: 0.08
  target_shift_ratios: [0.08]
  target_horizon_mode: all
  target_horizon_modes: [all]
  target_horizon_count: 3
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.03
  evaluation_tail_horizon_count: 3
  max_clean_mae_delta_ratio: 0.05
  recheck_top_k: 1
  recheck_repeats: 1
  search_stages:
    - name: local_error_smoke
      explicit_candidates:
        - selection_strategy: error
          window_mode: hybrid
          sample_selection_mode: input_energy
          target_weight_mode: flat
          trigger_steps: 3
          trigger_node_count: 3
          poison_ratio: 0.018
          sigma_multiplier: 0.065
          target_shift_ratio: 0.08
        - selection_strategy: error
          window_mode: hybrid
          sample_selection_mode: local_error_ratio
          target_weight_mode: ranked_decay
          trigger_steps: 3
          trigger_node_count: 3
          poison_ratio: 0.018
          sigma_multiplier: 0.065
          target_shift_ratio: 0.08

defense:
  zscore_threshold: 3.0
  moving_average_window: 3
  frequency_band_fraction: 0.25

output:
  root_dir: ../results
