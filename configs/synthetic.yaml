experiment_name: synthetic_smoke_test
seed: 42

dataset:
  name: SYNTHETIC-METR-LA
  data_path: ../data/synthetic/synthetic_metr_la.h5
  adjacency_path: ../data/synthetic/synthetic_metr_la_adj.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 32
  num_workers: 0
  fill_missing: true
  scale: true

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.1
  lr: 0.001
  weight_decay: 0.0
  epochs: 4
  patience: 2
  loss: mae
  device: cpu
  repeats: 2

poison:
  trigger_steps: 3
  trigger_node_count: 5
  poison_ratios: [0.01, 0.03]
  sigma_multipliers: [0.1, 0.2]
  selection_strategies: [random, error, centrality_gradient]
  target_shift_ratio: 0.10
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.05

defense:
  zscore_threshold: 2.5
  moving_average_window: 3
  frequency_band_fraction: 0.25

output:
  root_dir: ../results
