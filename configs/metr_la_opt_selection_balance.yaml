experiment_name: metr_la_opt_selection_balance
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 30
  patience: 10
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 3
  trigger_node_count: 3
  selection_strategies: [error]
  window_modes: [hybrid]
  sample_selection_mode: directional_headroom
  target_weight_mode: dual_focus
  target_shift_ratio: 0.08
  target_horizon_mode: all
  target_horizon_count: 3
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.03
  evaluation_tail_horizon_count: 3
  time_smoothing_kernel: 3
  frequency_smoothing_strength: 0.05
  frequency_cutoff_ratio: 0.5
  frequency_decay: 0.35
  headroom_floor: 0.0
  headroom_error_mix: 0.6
  global_shift_fraction: 0.3
  tail_focus_multiplier: 1.6
  loss_focus_mode: directional_focus
  loss_selected_node_weight: 1.3
  loss_tail_horizon_weight: 2.2
  loss_headroom_boost: 0.8
  node_rank_weights: [1.0, 0.85, 0.7]
  tail_horizon_weights: [0.7, 0.85, 1.0]
  max_clean_mae_delta_ratio: 0.05
  recheck_top_k: 3
  recheck_repeats: 3
  search_stages:
    - name: selection_balance_main
      explicit_candidates:
        - &sel_base
          selection_strategy: error
          window_mode: hybrid
          trigger_steps: 3
          trigger_node_count: 3
          target_shift_ratio: 0.08
          target_weight_mode: dual_focus
          target_horizon_mode: all
          target_horizon_count: 3
          time_smoothing_kernel: 3
          frequency_smoothing_strength: 0.05
          frequency_cutoff_ratio: 0.5
          frequency_decay: 0.35
          global_shift_fraction: 0.3
          tail_focus_multiplier: 1.6
          loss_focus_mode: directional_focus
          loss_selected_node_weight: 1.3
          loss_tail_horizon_weight: 2.2
          loss_headroom_boost: 0.8
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.0625
          sample_selection_mode: directional_headroom
          headroom_error_mix: 0.6
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.065
          sample_selection_mode: directional_headroom
          headroom_error_mix: 0.6
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.0625
          sample_selection_mode: directional_headroom
          headroom_error_mix: 0.6
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.065
          sample_selection_mode: directional_headroom
          headroom_error_mix: 0.6
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.0625
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.55
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.065
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.55
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.0625
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.55
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.065
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.55
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.0625
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.65
        - <<: *sel_base
          poison_ratio: 0.019
          sigma_multiplier: 0.065
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.65
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.0625
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.65
        - <<: *sel_base
          poison_ratio: 0.02
          sigma_multiplier: 0.065
          sample_selection_mode: hybrid_headroom_error
          headroom_error_mix: 0.65

output:
  root_dir: ../results
