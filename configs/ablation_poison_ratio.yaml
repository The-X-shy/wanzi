experiment_name: ablation_poison_ratio
seed: 42

dataset:
  name: METR-LA
  data_path: ../data/metr-la.h5
  data_key: df
  adjacency_path: ../data/adj_mx.pkl
  input_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  batch_size: 256
  num_workers: 0
  fill_missing: true
  scale: true
  shuffle_train: false

training:
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  lr: 0.0005
  weight_decay: 0.0
  epochs: 30
  patience: 10
  loss: mae
  device: auto
  repeats: 1
  grad_clip_norm: 0.5

poison:
  trigger_steps: 3
  trigger_node_count: 3
  fallback_shift_ratio: 0.05
  success_tolerance_ratio: 0.03
  evaluation_tail_horizon_count: 3
  node_rank_weights: [1.0, 0.85, 0.7]
  tail_horizon_weights: [0.7, 0.85, 1.0]
  selection_strategies: [error]
  window_modes: [hybrid]
  poison_ratios: [0.02]
  sigma_multipliers: [0.065]
  target_shift_ratios: [0.075]
  sample_selection_modes: [directional_headroom]
  target_weight_modes: [dual_focus]
  target_horizon_modes: [all]
  target_horizon_count: 3
  time_smoothing_kernels: [3]
  frequency_smoothing_strengths: [0.05]
  frequency_cutoff_ratios: [0.5]
  frequency_decays: [0.35]
  spectral_constraint_strengths: [0.0]
  headroom_error_mixes: [0.6]
  global_shift_fractions: [0.3]
  tail_focus_multipliers: [1.6]
  loss_focus_modes: [directional_focus]
  loss_selected_node_weights: [1.2]
  loss_tail_horizon_weights: [1.9]
  loss_headroom_boosts: [0.6]

ablation:
  vary_param: poison_ratio
  vary_values: [0.01, 0.015, 0.02, 0.025, 0.03, 0.04]
  repeats: 3

output:
  root_dir: ../results
